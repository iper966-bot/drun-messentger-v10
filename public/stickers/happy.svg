<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-happy" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#3a2a55"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </radialGradient>
    <radialGradient id="fur-happy" cx="45%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#f0c384"/>
      <stop offset="100%" stop-color="#d99e56"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#bg-happy)"/>
  <!-- ears -->
  <circle cx="52" cy="55" r="26" fill="#c98a45"/>
  <circle cx="148" cy="55" r="26" fill="#c98a45"/>
  <circle cx="52" cy="57" r="15" fill="#8a5a2e"/>
  <circle cx="148" cy="57" r="15" fill="#8a5a2e"/>
  <!-- head -->
  <ellipse cx="100" cy="112" rx="72" ry="66" fill="url(#fur-happy)"/>
  <!-- cheeks -->
  <ellipse cx="48" cy="128" rx="26" ry="22" fill="#f3cd94"/>
  <ellipse cx="152" cy="128" rx="26" ry="22" fill="#f3cd94"/>
  <ellipse cx="48" cy="132" rx="12" ry="9" fill="#f0a3a3" opacity="0.55"/>
  <ellipse cx="152" cy="132" rx="12" ry="9" fill="#f0a3a3" opacity="0.55"/>
  <!-- eyes happy arcs -->
  <path d="M62 100 Q74 84 86 100" stroke="#3a2410" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M114 100 Q126 84 138 100" stroke="#3a2410" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- nose -->
  <ellipse cx="100" cy="118" rx="9" ry="7" fill="#5c3a1e"/>
  <!-- mouth big smile -->
  <path d="M78 134 Q100 158 122 134" stroke="#5c3a1e" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- teeth -->
  <rect x="93" y="140" width="14" height="12" rx="3" fill="#fff8ea"/>
